version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mem0-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  mem0-service:
    build: .
    container_name: mem0-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - hf_cache:/root/.cache/huggingface
      - sqlite_data:/root/.mem0
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
  hf_cache:
  sqlite_data: