app:
  host: "0.0.0.0"
  port: 8000

mem0:
  llm:
    provider: "openai"
    temperature: 0.1
    max_tokens: 2000

  embedder:
    provider: "huggingface"
    model: "multi-qa-MiniLM-L6-cos-v1"

  vector_store:
    provider: "qdrant"
    collection_name: "mem0_v1"
    host: "localhost"
    port: 6333
